version: '3.7'

x-minio-common: &minio-common
    image: quay.io/minio/minio:latest
    command: server --console-address ":9001" /mnt/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

services:
  db:
    container_name: db
    image: postgres:16.4-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5432:5432
    tty: true
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d smoky-moon" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - pgdata:/var/lib/postgresql
  smoky-moon:
    image: node:20.17.0-alpine
    container_name: smoky-moon
    tty: true
    command: npm run start
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:admin@db:5432/smoky-moon
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
  minio:
    <<: *minio-common
    hostname: minio
    volumes:
      - type: bind
        source: /mnt/data/compose
        target: /mnt/data
      - type: bind
        source: /etc/default/minio
        target: /etc/config.env

volumes:
  pgdata: {}
  minio_storage: {}

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450